name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install numpy pillow

      - name: Build site
        run: python build.py

      - name: Stash built files outside workspace
        run: |
          mkdir -p /tmp/site
          cp dist/index.html /tmp/site/index.html
          cp dist/coaster_preview.png /tmp/site/coaster_preview.png
          touch /tmp/site/.nojekyll
          echo "✅ Built files stashed to /tmp/site"
          ls -la /tmp/site

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/site/index.html index.html
          cp /tmp/site/coaster_preview.png coaster_preview.png
          cp /tmp/site/.nojekyll .nojekyll
          git add index.html coaster_preview.png .nojekyll
          git commit -m "deploy: ${{ github.sha }}" --allow-empty
          git push origin gh-pages
          echo "✅ Pushed to gh-pages"

      - name: Checkout main again for clasp
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Write clasp project config
        run: echo '${{ secrets.CLASP_JSON }}' > .clasp.json

      - name: Push Apps Script
        run: clasp push --force

      - name: Redeploy Apps Script
        run: clasp deploy --deploymentId ${{ secrets.DEPLOYMENT_ID }} --description "Deploy from ${{ github.sha }}"
