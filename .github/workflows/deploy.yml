name: Deploy to Apps Script & GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install numpy pillow

      - name: Build site
        run: python build.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Write clasp project config
        run: echo '${{ secrets.CLASP_JSON }}' > .clasp.json

      - name: Push Apps Script
        run: clasp push --force
        working-directory: ./src

      - name: Redeploy Apps Script
        run: clasp deploy --deploymentId ${{ secrets.DEPLOYMENT_ID }} --description "Deploy from ${{ github.sha }}"
        working-directory: ./src
