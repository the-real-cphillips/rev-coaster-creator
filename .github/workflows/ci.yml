name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install numpy pillow

      - name: Build site
        run: python build.py
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}

      - name: Verify output files exist
        run: |
          test -f dist/index.html       || (echo "❌ dist/index.html missing" && exit 1)
          test -f dist/coaster_preview.png || (echo "❌ dist/coaster_preview.png missing" && exit 1)
          echo "✅ Output files present"

      - name: Check index.html size is reasonable
        run: |
          SIZE=$(wc -c < dist/index.html)
          echo "index.html size: $SIZE bytes"
          [ "$SIZE" -gt 50000 ]  || (echo "❌ index.html suspiciously small ($SIZE bytes)" && exit 1)
          [ "$SIZE" -lt 500000 ] || (echo "❌ index.html suspiciously large ($SIZE bytes)" && exit 1)
          echo "✅ Size looks good"

      - name: Check for placeholder strings left in output
        run: |
          if grep -q "YOUR_APPS_SCRIPT_WEB_APP_URL_HERE" dist/index.html; then
            echo "⚠️  Warning: APPS_SCRIPT_URL placeholder still present — form submissions won't work until deployed with real URL"
          fi
          if grep -q "YOUR_SPREADSHEET_ID_HERE" dist/index.html; then
            echo "❌ Spreadsheet ID placeholder still present in output" && exit 1
          fi
          echo "✅ Placeholder check passed"

      - name: Validate no JS syntax errors
        run: |
          node --input-type=module << 'JSEOF'
          import { readFileSync } from 'fs';
          const html = readFileSync('dist/index.html', 'utf8');
          const scriptMatch = html.match(/<script>([\s\S]*?)<\/script>/);
          if (!scriptMatch) { console.error('No script block found'); process.exit(1); }
          try {
            new Function(scriptMatch[1]);
            console.log('✅ JS syntax OK');
          } catch(e) {
            console.error('❌ JS syntax error:', e.message);
            process.exit(1);
          }
          JSEOF